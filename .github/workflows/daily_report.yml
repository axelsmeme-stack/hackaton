name: Enviar Reporte AgTech Diario

on:
  schedule:
    - cron: '0 4 * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # ESTA ES LA PARTE QUE SOLUCIONA EL ERROR DE TU IMAGEN
      - name: Instalar librerías
        run: pip install requests twilio

      - name: Ejecutar script de WhatsApp
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          MY_PHONE_NUMBER: ${{ secrets.MY_PHONE_NUMBER }}
        run: python bot_whatsapp.py
